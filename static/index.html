<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapdeal Customer Support</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <span class="logo-snap">snap</span><span class="logo-deal">deal</span>
            </div>
            <span class="header-title">Customer Support</span>
        </header>

        <main class="main">
            <div class="transcript-panel" id="transcript">
                <div class="transcript-placeholder">
                    Start a session to speak with Priya, your Snapdeal support assistant.
                </div>
            </div>

            <div class="status-bar">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Not connected</span>
            </div>

            <div class="mic-container">
                <button class="mic-btn" id="micBtn" disabled aria-label="Hold to speak">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                    <span class="mic-label">Hold to Speak</span>
                </button>
            </div>

            <div class="session-controls">
                <button class="btn btn-start" id="startBtn">Start Session</button>
                <button class="btn btn-end" id="endBtn" disabled>End Session</button>
            </div>

            <div class="agent-connect-card" id="agentCard" style="display:none;">
                <div class="agent-card-title">Connecting to Human Agent</div>
                <div class="agent-card-body">
                    <div class="agent-info-row">
                        <span class="agent-info-label">Queue Position</span>
                        <span class="agent-info-value" id="queuePosition">—</span>
                    </div>
                    <div class="agent-info-row">
                        <span class="agent-info-label">Estimated Wait</span>
                        <span class="agent-info-value" id="waitTime">—</span>
                    </div>
                    <div class="agent-info-row">
                        <span class="agent-info-label">Case Number</span>
                        <span class="agent-info-value" id="caseNumber">—</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
