<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapdeal Customer Support</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                regs.forEach(r => r.unregister());
            });
        }
    </script>
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
    <div class="layout">

        <!-- ── Voice Bot ── -->
        <div class="app">
            <header class="header">
                <div class="logo">
                    <span class="logo-snap">snap</span><span class="logo-deal">deal</span>
                </div>
                <span class="header-title">Customer Support</span>
            </header>

            <main class="main">
                <div class="transcript-panel" id="transcript">
                    <div class="transcript-placeholder">
                        Start a session to speak with Priya, your Snapdeal support assistant.
                    </div>
                </div>

                <div class="status-bar">
                    <span class="status-dot" id="statusDot"></span>
                    <span class="status-text" id="statusText">Not connected</span>
                </div>

                <div class="mic-container">
                    <button class="mic-btn" id="micBtn" disabled aria-label="Click to speak">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                        <span class="mic-label" id="micLabel">Click to Speak</span>
                    </button>
                </div>

                <div class="session-controls">
                    <button class="btn btn-start" id="startBtn">Start Session</button>
                    <button class="btn btn-end" id="endBtn" disabled>End Session</button>
                </div>

                <div class="agent-connect-card" id="agentCard" style="display:none;">
                    <div class="agent-card-title">Connecting to Human Agent</div>
                    <div class="agent-card-body">
                        <div class="agent-info-row">
                            <span class="agent-info-label">Queue Position</span>
                            <span class="agent-info-value" id="queuePosition">—</span>
                        </div>
                        <div class="agent-info-row">
                            <span class="agent-info-label">Estimated Wait</span>
                            <span class="agent-info-value" id="waitTime">—</span>
                        </div>
                        <div class="agent-info-row">
                            <span class="agent-info-label">Case Number</span>
                            <span class="agent-info-value" id="caseNumber">—</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- ── Test Data Panel ── -->
        <aside class="data-panel">
            <div class="dp-header">🧪 Test Data</div>

            <div class="dp-section-title">Orders</div>
            <div id="ordersContainer" class="dp-loading">Loading…</div>

            <div class="dp-section-title" style="margin-top:20px;">Accounts</div>
            <div id="accountsContainer" class="dp-loading">Loading…</div>
        </aside>

    </div>

    <script>
    'use strict';

    // ── DOM refs ──
    const transcriptEl = document.getElementById('transcript');
    const statusDot    = document.getElementById('statusDot');
    const statusText   = document.getElementById('statusText');
    const micBtn       = document.getElementById('micBtn');
    const startBtn     = document.getElementById('startBtn');
    const endBtn       = document.getElementById('endBtn');
    const agentCard    = document.getElementById('agentCard');

    // ── State ──
    let ws           = null;
    let audioCtx     = null;
    let micStream    = null;
    let processor    = null;
    let sourceNode   = null;
    let isRecording  = false;
    let nextPlayTime  = 0;
    let currentBotEl  = null;
    let currentUserEl = null;

    // ── Status helpers ──
    function setStatus(state, text) {
        statusDot.className = 'status-dot ' + (state || '');
        statusText.textContent = text;
    }

    // ── Transcript helpers ──
    function clearPlaceholder() {
        const ph = transcriptEl.querySelector('.transcript-placeholder');
        if (ph) ph.remove();
    }

    function appendMessage(role, text) {
        clearPlaceholder();
        const el = document.createElement('div');
        el.className = 'transcript-msg ' + role;
        el.innerHTML =
            `<div class="transcript-msg-label">${role === 'bot' ? '🤖 Priya' : '👤 You'}</div>` +
            `<div class="transcript-msg-bubble"></div>`;
        el.querySelector('.transcript-msg-bubble').textContent = text;
        transcriptEl.appendChild(el);
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
        return el;
    }

    function appendToBubble(el, text) {
        el.querySelector('.transcript-msg-bubble').textContent += text;
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    // ── PCM16 helpers ──
    function floatTo16BitPCM(float32) {
        const buf  = new ArrayBuffer(float32.length * 2);
        const view = new DataView(buf);
        for (let i = 0; i < float32.length; i++) {
            const s = Math.max(-1, Math.min(1, float32[i]));
            view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return buf;
    }

    function bufferToBase64(buf) {
        const bytes = new Uint8Array(buf);
        let bin = '';
        for (let i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
        return btoa(bin);
    }

    function base64ToFloat32(b64) {
        const bin   = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const pcm16  = new Int16Array(bytes.buffer);
        const f32    = new Float32Array(pcm16.length);
        for (let i = 0; i < pcm16.length; i++) f32[i] = pcm16[i] / 32768;
        return f32;
    }

    // ── Audio playback ──
    function playChunk(b64Audio) {
        if (!audioCtx) return;
        const f32    = base64ToFloat32(b64Audio);
        const buffer = audioCtx.createBuffer(1, f32.length, 24000);
        buffer.copyToChannel(f32, 0);
        const src = audioCtx.createBufferSource();
        src.buffer = buffer;
        src.connect(audioCtx.destination);
        const start = Math.max(audioCtx.currentTime, nextPlayTime);
        src.start(start);
        nextPlayTime = start + buffer.duration;
    }

    // ── Server event handler ──
    function handleEvent(event) {
        switch (event.type) {
            case 'session.updated':
                setStatus('connected', 'Connected — click the button to speak');
                micBtn.disabled = false;
                break;
            case 'response.output_audio.delta':
                setStatus('speaking', 'Priya is speaking…');
                playChunk(event.delta);
                break;
            case 'response.output_audio.done':
                nextPlayTime = 0;
                setStatus('connected', 'Connected — click the button to speak');
                currentBotEl = null;
                break;
            case 'response.output_audio_transcript.delta':
                if (!currentBotEl) currentBotEl = appendMessage('bot', '');
                appendToBubble(currentBotEl, event.delta);
                break;
            case 'response.output_audio_transcript.done':
                currentBotEl = null;
                break;
            case 'conversation.item.input_audio_transcription.completed':
                if (currentUserEl) {
                    currentUserEl.querySelector('.transcript-msg-bubble').textContent = event.transcript.trim();
                    currentUserEl = null;
                } else {
                    appendMessage('user', event.transcript.trim());
                }
                break;
            case 'agent_connect':
                showAgentCard(event.data);
                break;
            case 'error':
                console.error('Realtime error:', event);
                setStatus('', 'Error — check console');
                break;
        }
    }

    // ── Agent connect UI ──
    function showAgentCard(data) {
        document.getElementById('queuePosition').textContent = `#${data.queue_position}`;
        document.getElementById('waitTime').textContent      = `~${data.wait_time_minutes} min`;
        document.getElementById('caseNumber').textContent    = `#${data.case_number}`;
        agentCard.style.display = 'block';
        micBtn.disabled         = true;
        setStatus('', 'Connecting to human agent…');
    }

    // ── Recording ──
    async function startRecording() {
        if (!ws || ws.readyState !== WebSocket.OPEN || isRecording) return;
        try {
            await audioCtx.resume();
            micStream  = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 24000, channelCount: 1 } });
            sourceNode = audioCtx.createMediaStreamSource(micStream);
            processor  = audioCtx.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = (e) => {
                if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
                const pcm16 = floatTo16BitPCM(e.inputBuffer.getChannelData(0));
                ws.send(JSON.stringify({ type: 'input_audio_buffer.append', audio: bufferToBase64(pcm16) }));
            };

            sourceNode.connect(processor);
            processor.connect(audioCtx.destination);
            isRecording = true;
            micBtn.classList.add('recording');
            setStatus('listening', 'Listening… click the button when done');
        } catch (err) {
            alert('Microphone access denied. Please allow mic access and try again.');
        }
    }

    function stopRecording() {
        if (!isRecording) return;
        isRecording = false;
        micBtn.classList.remove('recording');

        if (processor)  { processor.disconnect();  processor  = null; }
        if (sourceNode) { sourceNode.disconnect();  sourceNode = null; }
        if (micStream)  { micStream.getTracks().forEach(t => t.stop()); micStream = null; }

        if (ws && ws.readyState === WebSocket.OPEN) {
            currentUserEl = appendMessage('user', '…');
            ws.send(JSON.stringify({ type: 'input_audio_buffer.commit' }));
            ws.send(JSON.stringify({ type: 'response.create' }));
            setStatus('connected', 'Processing…');
        }
    }

    function toggleRecording() {
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    }

    // ── Session ──
    function startSession() {
        audioCtx     = new AudioContext({ sampleRate: 24000 });
        nextPlayTime = 0;
        currentBotEl = null;

        const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${wsProtocol}//${location.host}/ws`);

        ws.onopen  = () => setStatus('connected', 'Connecting to Priya…');
        ws.onclose = () => {
            setStatus('', 'Disconnected');
            micBtn.disabled   = true;
            startBtn.disabled = false;
            endBtn.disabled   = true;
        };
        ws.onerror = () => setStatus('', 'Connection error');
        ws.onmessage = (e) => {
            try { handleEvent(JSON.parse(e.data)); } catch (_) {}
        };

        startBtn.disabled = true;
        endBtn.disabled   = false;
    }

    function endSession() {
        if (ws) { ws.close(); ws = null; }
        if (audioCtx) { audioCtx.close(); audioCtx = null; }
        stopRecording();
    }

    // ── Button bindings (click toggle — no hold required) ──
    micBtn.addEventListener('click', toggleRecording);
    startBtn.addEventListener('click', startSession);
    endBtn.addEventListener('click',   endSession);

    // ── Mock data panel ──
    fetch('/api/mock-data')
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(({ orders, accounts }) => {
            const STATUS_COLOR = {
                delivered:        '#10b981',
                in_transit:       '#3b82f6',
                delayed:          '#f59e0b',
                cancelled:        '#ef4444',
                return_initiated:  '#8b5cf6',
                refund_processed: '#06b6d4',
            };
            const ordersEl = document.getElementById('ordersContainer');
            ordersEl.innerHTML = '';
            ordersEl.className = '';
            Object.values(orders).forEach(o => {
                const color = STATUS_COLOR[o.status] || '#6b7280';
                const badge = o.status.replace(/_/g, ' ');
                ordersEl.insertAdjacentHTML('beforeend', `
                    <div class="dp-order-card">
                        <div class="dp-order-top">
                            <span class="dp-order-id">${o.id}</span>
                            <span class="dp-badge" style="background:${color}20;color:${color};border-color:${color}40">${badge}</span>
                        </div>
                        <div class="dp-order-product">${o.product}</div>
                        <div class="dp-order-amount">₹${o.amount.toLocaleString('en-IN')}</div>
                    </div>
                `);
            });

            const accountsEl = document.getElementById('accountsContainer');
            accountsEl.innerHTML = '';
            accountsEl.className = '';
            Object.values(accounts).forEach(a => {
                accountsEl.insertAdjacentHTML('beforeend', `
                    <div class="dp-account-card">
                        <div class="dp-account-email">${a.email}</div>
                        <div class="dp-account-name">${a.name}</div>
                        <div class="dp-account-meta">
                            Wallet: <strong>₹${a.wallet_balance.toLocaleString('en-IN')}</strong>
                            &nbsp;·&nbsp; Orders: <strong>${a.recent_orders.join(', ')}</strong>
                        </div>
                    </div>
                `);
            });
        })
        .catch(() => {
            document.getElementById('ordersContainer').textContent = 'Failed to load';
            document.getElementById('accountsContainer').textContent = 'Failed to load';
        });
    </script>
</body>
</html>
