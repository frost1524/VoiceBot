<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapdeal Customer Support</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="layout">

        <!-- ── Voice Bot ── -->
        <div class="app">
            <header class="header">
                <div class="logo">
                    <span class="logo-snap">snap</span><span class="logo-deal">deal</span>
                </div>
                <span class="header-title">Customer Support</span>
            </header>

            <main class="main">
                <div class="transcript-panel" id="transcript">
                    <div class="transcript-placeholder">
                        Start a session to speak with Priya, your Snapdeal support assistant.
                    </div>
                </div>

                <div class="status-bar">
                    <span class="status-dot" id="statusDot"></span>
                    <span class="status-text" id="statusText">Not connected</span>
                </div>

                <div class="mic-container">
                    <button class="mic-btn" id="micBtn" disabled aria-label="Hold to speak">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                        <span class="mic-label">Hold to Speak</span>
                    </button>
                </div>

                <div class="session-controls">
                    <button class="btn btn-start" id="startBtn">Start Session</button>
                    <button class="btn btn-end" id="endBtn" disabled>End Session</button>
                </div>

                <div class="agent-connect-card" id="agentCard" style="display:none;">
                    <div class="agent-card-title">Connecting to Human Agent</div>
                    <div class="agent-card-body">
                        <div class="agent-info-row">
                            <span class="agent-info-label">Queue Position</span>
                            <span class="agent-info-value" id="queuePosition">—</span>
                        </div>
                        <div class="agent-info-row">
                            <span class="agent-info-label">Estimated Wait</span>
                            <span class="agent-info-value" id="waitTime">—</span>
                        </div>
                        <div class="agent-info-row">
                            <span class="agent-info-label">Case Number</span>
                            <span class="agent-info-value" id="caseNumber">—</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- ── Test Data Panel ── -->
        <aside class="data-panel">
            <div class="dp-header">🧪 Test Data</div>

            <div class="dp-section-title">Orders</div>
            <div id="ordersContainer" class="dp-loading">Loading…</div>

            <div class="dp-section-title" style="margin-top:20px;">Accounts</div>
            <div id="accountsContainer" class="dp-loading">Loading…</div>
        </aside>

    </div>

    <script src="/static/app.js"></script>
    <script>
        // Fetch and render mock data panel
        fetch('/api/mock-data')
            .then(r => r.json())
            .then(({ orders, accounts }) => {
                // ── Orders ──
                const STATUS_COLOR = {
                    delivered:        '#10b981',
                    in_transit:       '#3b82f6',
                    delayed:          '#f59e0b',
                    cancelled:        '#ef4444',
                    return_initiated:  '#8b5cf6',
                    refund_processed: '#06b6d4',
                };
                const ordersEl = document.getElementById('ordersContainer');
                ordersEl.innerHTML = '';
                ordersEl.className = '';
                Object.values(orders).forEach(o => {
                    const color = STATUS_COLOR[o.status] || '#6b7280';
                    const badge = o.status.replace(/_/g, ' ');
                    ordersEl.insertAdjacentHTML('beforeend', `
                        <div class="dp-order-card">
                            <div class="dp-order-top">
                                <span class="dp-order-id">${o.id}</span>
                                <span class="dp-badge" style="background:${color}20;color:${color};border-color:${color}40">${badge}</span>
                            </div>
                            <div class="dp-order-product">${o.product}</div>
                            <div class="dp-order-amount">₹${o.amount.toLocaleString('en-IN')}</div>
                        </div>
                    `);
                });

                // ── Accounts ──
                const accountsEl = document.getElementById('accountsContainer');
                accountsEl.innerHTML = '';
                accountsEl.className = '';
                Object.values(accounts).forEach(a => {
                    accountsEl.insertAdjacentHTML('beforeend', `
                        <div class="dp-account-card">
                            <div class="dp-account-email">${a.email}</div>
                            <div class="dp-account-name">${a.name}</div>
                            <div class="dp-account-meta">
                                Wallet: <strong>₹${a.wallet_balance.toLocaleString('en-IN')}</strong>
                                &nbsp;·&nbsp; Orders: <strong>${a.recent_orders.join(', ')}</strong>
                            </div>
                        </div>
                    `);
                });
            })
            .catch(() => {
                document.getElementById('ordersContainer').textContent = 'Failed to load';
                document.getElementById('accountsContainer').textContent = 'Failed to load';
            });
    </script>
</body>
</html>
